services:
  - type: web
    name: sp-pickles-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: sp-pickles-db
          property: connectionString

  - type: web
    name: sp-pickles-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE_URL
        value: https://sp-pickles-backend.onrender.com/api
    routes:
      - path: /
        source: ./frontend/dist

databases:
  - name: sp-pickles-db
    databaseName: sp_pickles
    user: sp_pickles_user
    plan: free
    region: oregon
